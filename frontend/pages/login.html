<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Войти — Trainer Online</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
<nav>
  <a class="logo" href="index.html">Trainer Online</a>
  <div class="nav-links"></div>
</nav>

<div class="form-card">
  <div class="tabs">
    <div class="tab active" id="tab-login">Вход</div>
    <div class="tab" id="tab-register">Регистрация</div>
  </div>

  <!-- Login -->
  <form id="form-login">
    <div class="form-group">
      <label>Имя пользователя</label>
      <input type="text" id="l-username" placeholder="Ваше имя" required>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="l-pass" placeholder="••••••••" required>
    </div>
    <div class="form-error" id="l-error"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.8rem">Войти</button>
  </form>

  <!-- Register -->
  <form id="form-register" style="display:none">
    <div class="form-group">
      <label>Имя</label>
      <input type="text" id="r-name" placeholder="Ваше имя" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="r-pass" placeholder="Минимум 6 символов" required>
    </div>
    <div class="form-group">
      <label>Роль</label>
      <select id="r-role">
        <option value="client">Клиент</option>
        <option value="trainer">Тренер</option>
      </select>
    </div>
    <div class="form-error" id="r-error"></div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.8rem">Зарегистрироваться</button>
  </form>
</div>

<script type="module">
  import { api } from '../scripts/api.js';

  // tabs
  document.getElementById('tab-login').addEventListener('click', () => switchTab('login'));
  document.getElementById('tab-register').addEventListener('click', () => switchTab('register'));

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  }

  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault();
    const err = document.getElementById('l-error');
    try {
      const { access_token } = await api.login(
        document.getElementById('l-username').value,
        document.getElementById('l-pass').value,
      );
      localStorage.setItem('token', access_token);
      const user = await api.me();
      localStorage.setItem('user', JSON.stringify(user));
      location.href = 'index.html';
    } catch (ex) { err.textContent = ex.message; }
  });

  document.getElementById('form-register').addEventListener('submit', async e => {
    e.preventDefault();
    const err = document.getElementById('r-error');
    try {
      await api.register(
        document.getElementById('r-name').value,
        document.getElementById('r-email').value,
        document.getElementById('r-pass').value,
        document.getElementById('r-role').value,
      );
      const { access_token } = await api.login(
        document.getElementById('r-name').value,
        document.getElementById('r-pass').value,
      );
      localStorage.setItem('token', access_token);
      const user = await api.me();
      localStorage.setItem('user', JSON.stringify(user));
      location.href = 'index.html';
    } catch (ex) { err.textContent = ex.message; }
  });
</script>
</body>
</html>
